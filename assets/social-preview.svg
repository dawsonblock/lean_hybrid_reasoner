<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none"
    xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="640" gradientUnits="userSpaceOnUse">
            <stop offset="0" stop-color="#0B1020"/>
            <stop offset="0.55" stop-color="#0D1B3D"/>
            <stop offset="1" stop-color="#112E4A"/>
        </linearGradient>
        <linearGradient id="line" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#60A5FA"/>
            <stop offset="1" stop-color="#22D3EE"/>
        </linearGradient>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
            <feGaussianBlur stdDeviation="10" result="blur"/>
            <feMerge>
                <feMergeNode in="blur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>

    <rect width="1280" height="640" fill="url(#bg)"/>

    <g opacity="0.18">
        <path d="M0 540C240 420 350 610 590 510C810 420 940 470 1280 330" stroke="url(#line)" stroke-width="3"/>
        <path d="M0 500C260 380 390 570 610 480C860 380 990 450 1280 290" stroke="#38BDF8" stroke-width="2"/>
    </g>

    <g opacity="0.22">
        <circle cx="190" cy="112" r="84" fill="#38BDF8"/>
        <circle cx="1060" cy="548" r="120" fill="#2563EB"/>
    </g>

    <g filter="url(#glow)">
        <rect x="116" y="122" width="1048" height="396" rx="24" fill="#0F172A" fill-opacity="0.82" stroke="#334155"/>
    </g>

    <text x="164" y="220" fill="#E2E8F0" font-family="Segoe UI, Inter, Helvetica, Arial, sans-serif" font-size="64" font-weight="700">
    Lean Hybrid Reasoner
    </text>
    <text x="164" y="280" fill="#93C5FD" font-family="Segoe UI, Inter, Helvetica, Arial, sans-serif" font-size="36" font-weight="500">
    v0.6 - controllable hybrid theorem proving
    </text>
    <text x="164" y="350" fill="#CBD5E1" font-family="Segoe UI, Inter, Helvetica, Arial, sans-serif" font-size="30" font-weight="400">
    Learned guidance, symbolic verification, reproducible traces.
    </text>

    <g transform="translate(164,404)">
        <rect x="0" y="0" width="206" height="46" rx="23" fill="#0EA5E9" fill-opacity="0.2" stroke="#38BDF8"/>
        <text x="20" y="30" fill="#E0F2FE" font-family="Segoe UI, Inter, Helvetica, Arial, sans-serif" font-size="22">Trace v0.6</text>

        <rect x="224" y="0" width="250" height="46" rx="23" fill="#22D3EE" fill-opacity="0.16" stroke="#67E8F9"/>
        <text x="244" y="30" fill="#ECFEFF" font-family="Segoe UI, Inter, Helvetica, Arial, sans-serif" font-size="22">Failure Grouping</text>

        <rect x="492" y="0" width="314" height="46" rx="23" fill="#60A5FA" fill-opacity="0.16" stroke="#93C5FD"/>
        <text x="512" y="30" fill="#EFF6FF" font-family="Segoe UI, Inter, Helvetica, Arial, sans-serif" font-size="22">Deterministic Data Packs</text>
    </g>
</svg>
