<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none"
    xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="640" gradientUnits="userSpaceOnUse">
            <stop offset="0" stop-color="#F8FAFC"/>
            <stop offset="0.5" stop-color="#E2E8F0"/>
            <stop offset="1" stop-color="#DBEAFE"/>
        </linearGradient>
        <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#0284C7"/>
            <stop offset="1" stop-color="#0369A1"/>
        </linearGradient>
        <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
            <path d="M28 0H0V28" fill="none" stroke="#CBD5E1" stroke-width="1"/>
        </pattern>
    </defs>

    <rect width="1280" height="640" fill="url(#bg)"/>
    <rect width="1280" height="640" fill="url(#grid)" opacity="0.35"/>

    <rect x="90" y="84" width="1100" height="472" rx="28" fill="#FFFFFF" fill-opacity="0.88" stroke="#94A3B8"/>

    <rect x="130" y="126" width="10" height="390" rx="5" fill="url(#accent)"/>

    <text x="168" y="214" fill="#0F172A" font-family="Segoe UI, Inter, Helvetica, Arial, sans-serif" font-size="68" font-weight="700">
    Lean Hybrid Reasoner
    </text>
    <text x="168" y="276" fill="#0C4A6E" font-family="Segoe UI, Inter, Helvetica, Arial, sans-serif" font-size="34" font-weight="600">
    v0.6 - hybrid theorem proving for Lean-style workflows
    </text>
    <text x="168" y="336" fill="#334155" font-family="Segoe UI, Inter, Helvetica, Arial, sans-serif" font-size="29" font-weight="400">
    Deterministic traces, strict schema validation, migration, and budgeted search.
    </text>

    <g transform="translate(168,390)">
        <rect x="0" y="0" width="188" height="44" rx="22" fill="#E0F2FE" stroke="#0EA5E9"/>
        <text x="20" y="29" fill="#075985" font-family="Segoe UI, Inter, Helvetica, Arial, sans-serif" font-size="21">Trace v0.6</text>

        <rect x="206" y="0" width="232" height="44" rx="22" fill="#ECFEFF" stroke="#22D3EE"/>
        <text x="226" y="29" fill="#155E75" font-family="Segoe UI, Inter, Helvetica, Arial, sans-serif" font-size="21">Theorem Grouping</text>

        <rect x="456" y="0" width="296" height="44" rx="22" fill="#EFF6FF" stroke="#60A5FA"/>
        <text x="476" y="29" fill="#1E3A8A" font-family="Segoe UI, Inter, Helvetica, Arial, sans-serif" font-size="21">Deterministic Data Packs</text>
    </g>
</svg>
